# Ruff configuration file
target-version = "py311"
line-length = 88
indent-width = 4

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "DJ",  # flake8-django
    "S",   # flake8-bandit
    "T20", # flake8-print
]

ignore = [
    "E501",  # line too long, handled by formatter
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
    "S101",  # use of assert detected
    "DJ01",  # avoid using null=True on string-based fields
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"*/migrations/*" = ["E501", "F401", "F841"]
"*/settings/*" = ["F405", "F403"]
"*/tests/*" = ["S101"]

[lint.isort]
known-first-party = ["configurations"]
section-order = [
    "future",
    "standard-library", 
    "third-party",
    "first-party",
    "local-folder"
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"