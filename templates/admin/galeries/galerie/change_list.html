{% extends "admin/change_list.html" %}
{% load admin_urls static admin_list %}

{% block content_title %}
    {{ block.super }}
    
    {% if actions_rapides %}
    <div style="margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 6px; border: 1px solid #e0e0e0;">
        <h3 style="margin: 0 0 10px 0; color: #417690; font-size: 14px;">🚀 Actions rapides</h3>
        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            {% for action in actions_rapides %}
                <a href="{{ action.url }}" 
                   style="display: inline-block; padding: 8px 16px; background: #417690; color: white; text-decoration: none; border-radius: 4px; font-size: 13px; transition: background 0.2s;"
                   onmouseover="this.style.background='#2c5370'" 
                   onmouseout="this.style.background='#417690'"
                   title="{{ action.description }}">
                    {{ action.titre }}
                </a>
            {% endfor %}
        </div>
    </div>
    {% endif %}
{% endblock %}
