{% extends "admin/change_list.html" %}
{% load admin_urls static admin_list %}

{% block content_title %}
    {{ block.super }}
    
    {% if actions_rapides %}
    <div style="margin: 1.25rem 0; padding: 0.9375rem; background: #f8f9fa; border-radius: 0.375rem; border: 0.0625rem solid #e0e0e0;">
        <h3 style="margin: 0 0 0.625rem 0; color: #417690; font-size: 0.875rem;">🚀 Actions rapides</h3>
        <div style="display: flex; gap: 0.9375rem; flex-wrap: wrap;">
            {% for action in actions_rapides %}
                <a href="{{ action.url }}" 
                   style="display: inline-block; padding: 0.5rem 1rem; background: #417690; color: white; text-decoration: none; border-radius: 0.25rem; font-size: 0.8125rem; transition: background 0.2s;"
                   onmouseover="this.style.background='#2c5370'" 
                   onmouseout="this.style.background='#417690'"
                   title="{{ action.description }}">
                    {{ action.titre }}
                </a>
            {% endfor %}
        </div>
    </div>
    {% endif %}
{% endblock %}
